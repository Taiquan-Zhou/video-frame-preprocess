name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test tools
        run: python -m pip install ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Build and audit distributions
        shell: pwsh
        run: |
          $dist = Join-Path $env:RUNNER_TEMP "dist-audit"
          python -m build --outdir $dist
          $env:DIST_AUDIT_DIR = $dist
          @'
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          blocked = (
              "/tests/",
              "/.github/",
              "/output/",
              "/outputs/",
              "__pycache__",
              ".pytest_cache",
          )
          dist = Path(os.environ["DIST_AUDIT_DIR"])
          archives = list(dist.glob("*.whl")) + list(dist.glob("*.tar.gz"))
          if not archives:
              raise SystemExit("no distributions built")
          for archive in archives:
              if archive.suffix == ".whl":
                  with zipfile.ZipFile(archive) as zf:
                      names = zf.namelist()
              else:
                  with tarfile.open(archive, "r:gz") as tf:
                      names = tf.getnames()
              bad = [name for name in names if any(token in name for token in blocked)]
              if bad:
                  raise SystemExit(f"{archive.name} contains non-release files: {bad}")
          '@ | python -

      - name: Installed CLI smoke
        shell: pwsh
        run: |
          $source = (Resolve-Path .).Path
          $hostDir = Join-Path $env:RUNNER_TEMP "video-frame-preprocess-host"
          New-Item -ItemType Directory -Force -Path $hostDir | Out-Null
          Set-Location $hostDir
          python -m pip install $source
          video-frame-preprocess-demo --output input\sample.mp4 --frame_count 6 --fps 5 --width 96 --height 64
          video-frame-preprocess --video input\sample.mp4 --output outputs\sample_clear_frames --selection quality_filter --scan_fps 0 --sharpness_quantile 0 --max_drop_ratio 1 --max_consecutive_drops 6 --image_ext jpg --clean
          video-frame-preprocess-health outputs\sample_clear_frames
